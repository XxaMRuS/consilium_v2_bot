<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Bot — VK Mini App</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            padding-bottom: 70px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }

        .screen {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4caf50;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #4caf50;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
        }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #4caf50;
            color: white;
            font-weight: bold;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.8;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: #aaa;
            font-size: 12px;
            text-align: center;
            padding: 6px 0;
            flex: 1;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item.active {
            color: #4caf50;
        }

        .nav-icon {
            font-size: 24px;
            display: block;
        }

        .exercise-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loader {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 200;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .last-workout {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="screen-splash" class="screen active">
        <div class="loader">🏋️ Загрузка профиля...</div>
    </div>

    <div id="screen-home" class="screen">
        <div class="card">
            <div class="profile-row">
                <img id="avatar" class="avatar" src="" alt="avatar">
                <div>
                    <h3 id="user_name">Имя</h3>
                    <p style="font-size:12px; opacity:0.7;">ID: <span id="user_id">—</span></p>
                </div>
            </div>
        </div>
        <div class="card stats-grid">
            <div><div class="stat-value" id="points">0</div><div class="stat-label">⭐ Очки</div></div>
            <div><div class="stat-value" id="coins">0</div><div class="stat-label">🪙 Монеты</div></div>
            <div><div class="stat-value" id="fuel">0</div><div class="stat-label">⚡ Fun Fuel</div></div>
            <div><div class="stat-value" id="workouts_count">0</div><div class="stat-label">🏋️ Тренировок</div></div>
        </div>
        <div class="card" id="lastWorkoutCard" style="display:none;">
            <div class="last-workout">📊 Последняя тренировка: <span id="lastWorkoutText">—</span></div>
        </div>
        <button class="btn btn-primary" id="startWorkoutBtn">🔥 Начать тренировку</button>
    </div>

    <div id="screen-sport" class="screen">
        <div class="card">
            <h3>📋 Упражнения</h3>
            <div id="exercisesList"><div class="loader">Загрузка упражнений...</div></div>
        </div>
    </div>

    <div id="screen-pvp" class="screen">
        <div class="card">
            <h3>⚔️ PvP баттлы</h3>
            <p style="opacity:0.7;">Скоро здесь будут вызовы других игроков</p>
        </div>
    </div>

    <div id="screen-ranking" class="screen">
        <div class="card">
            <h3>🏆 Таблица лидеров</h3>
            <div id="leaderboardList"><div class="loader">Загрузка рейтинга...</div></div>
        </div>
    </div>

    <div id="screen-more" class="screen">
        <div class="card">
            <h3>📁 Дополнительно</h3>
            <button class="btn" id="mountainBtn">⛰️ Гора успеха</button>
            <button class="btn" id="hallOfFameBtn">🏆 Зал славы</button>
            <button class="btn" id="aiBtn">🤖 AI Тренер</button>
            <button class="btn" id="calendarBtn">📅 Календарь</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-item" data-screen="home"><span class="nav-icon">🏠</span><span>Главная</span></button>
    <button class="nav-item" data-screen="sport"><span class="nav-icon">🏋️</span><span>Спорт</span></button>
    <button class="nav-item" data-screen="pvp"><span class="nav-icon">⚔️</span><span>PvP</span></button>
    <button class="nav-item" data-screen="ranking"><span class="nav-icon">🏆</span><span>Рейтинг</span></button>
    <button class="nav-item" data-screen="more"><span class="nav-icon">📁</span><span>Ещё</span></button>
</div>

<script>
    // ---------- КОНФИГ ----------
    const API_BASE = window.location.origin; // автоопределение домена бэкенда

    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let currentVKUser = null;
    let userStats = {};

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(`screen-${screenId}`);
        if (target) target.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(btn => {
            if (btn.dataset.screen === screenId) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function showError(msg) {
        const errDiv = document.createElement('div');
        errDiv.className = 'error';
        errDiv.innerText = msg;
        document.getElementById('app')?.prepend(errDiv);
        setTimeout(() => errDiv.remove(), 3000);
    }

    // ---------- API СЛОЙ (с CORS и обработкой ошибок) ----------
    async function apiCall(endpoint, options = {}) {
        try {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) {
            console.error(`API error ${endpoint}:`, e);

            // Режим отладки: возвращаем тестовые данные при ошибке API
            const ua = navigator.userAgent;
            const isVK = ua.includes('VKApp') || ua.includes('VK_Android') || ua.includes('VK_iOS');

            if (!isVK) {
                console.warn('💡 Режим отладки: тестовые данные для', endpoint);

                // Тестовые данные для разных endpoints
                if (endpoint.includes('/users/')) {
                    return {
                        id: 123456789,
                        first_name: 'Тестовый',
                        username: 'test_user',
                        level: 1,
                        balances: { score: 1500, coins: 100, fun_fuel: 50 },
                        registered_date: new Date().toISOString()
                    };
                } else if (endpoint.includes('/exercises')) {
                    return {
                        count: 3,
                        exercises: [
                            { id: 1, name: 'Отжимания', calories: 50, points: 10 },
                            { id: 2, name: 'Приседания', calories: 80, points: 15 },
                            { id: 3, name: 'Подтягивания', calories: 60, points: 12 }
                        ]
                    };
                } else if (endpoint.includes('/leaderboard')) {
                    return {
                        count: 3,
                        leaderboard: [
                            { user_id: 1, first_name: 'Иван', total_score: 5000 },
                            { user_id: 2, first_name: 'Мария', total_score: 3500 },
                            { user_id: 3, first_name: 'Алексей', total_score: 2000 }
                        ]
                    };
                }

                // Пустой ответ для неизвестных endpoints
                return {};
            }

            throw e;
        }
    }

    async function registerVKUser(vkUser) {
        return await apiCall('/api/users/register', {
            method: 'POST',
            body: JSON.stringify({
                vk_id: vkUser.id,
                first_name: vkUser.first_name,
                last_name: vkUser.last_name || '',
                photo_url: vkUser.photo_100 || ''
            })
        });
    }

    async function loadUserProfile(vkId) {
        const data = await apiCall(`/api/users/${vkId}`);
        userStats = data;
        return data;
    }

    async function loadExercises() {
        // Режим отладки: используем тестовые данные
        const ua = navigator.userAgent;
        const isVK = ua.includes('VKApp') || ua.includes('VK_Android') || ua.includes('VK_iOS');

        if (!isVK) {
            const container = document.getElementById('exercisesList');
            const testExercises = [
                { id: 1, name: 'Отжимания', calories: 50, points: 10 },
                { id: 2, name: 'Приседания', calories: 80, points: 15 },
                { id: 3, name: 'Подтягивания', calories: 60, points: 12 }
            ];

            container.innerHTML = testExercises.map(ex => `
                <div class="exercise-item" data-exercise-id="${ex.id}">
                    <span><strong>${escapeHtml(ex.name)}</strong><br><small>🔥 ${ex.calories} ккал</small></span>
                    <button class="btn" style="width:auto; padding:8px 16px;">Выбрать</button>
                </div>
            `).join('');

            console.log('🧪 Режим отладки: тестовые упражнения загружены');
            return;
        }

        // Режим VK Mini App: запрашиваем из API
        const exercises = await apiCall('/api/exercises');
        const container = document.getElementById('exercisesList');
        if (!exercises || exercises.length === 0) {
            container.innerHTML = '<p style="opacity:0.7;">Нет упражнений</p>';
            return;
        }
        container.innerHTML = exercises.map(ex => `
            <div class="exercise-item" data-exercise-id="${ex.id}">
                <span><strong>${escapeHtml(ex.name)}</strong><br><small>🔥 ${ex.calories || 0} ккал</small></span>
                <button class="btn" style="width:auto; padding:8px 16px;">Выбрать</button>
            </div>
        `).join('');
    }

    async function loadLeaderboard() {
        // Режим отладки: используем тестовые данные
        const ua = navigator.userAgent;
        const isVK = ua.includes('VKApp') || ua.includes('VK_Android') || ua.includes('VK_iOS');

        if (!isVK) {
            const container = document.getElementById('leaderboardList');
            const testLeaders = [
                { name: 'Иван', points: 5000 },
                { name: 'Мария', points: 3500 },
                { name: 'Алексей', points: 2000 }
            ];

            container.innerHTML = testLeaders.map((u, idx) => `
                <div class="exercise-item">
                    <span>${idx+1}. ${escapeHtml(u.name)} — ⭐ ${u.points}</span>
                </div>
            `).join('');

            console.log('🧪 Режим отладки: тестовая таблица лидеров загружена');
            return;
        }

        // Режим VK Mini App: запрашиваем из API
        const leaders = await apiCall('/api/leaderboard');
        const container = document.getElementById('leaderboardList');
        if (!leaders || leaders.length === 0) {
            container.innerHTML = '<p style="opacity:0.7;">Нет данных</p>';
            return;
        }
        container.innerHTML = leaders.map((u, idx) => `
            <div class="exercise-item">
                <span>${idx+1}. ${escapeHtml(u.name || 'Игрок')} — ⭐ ${u.points || 0}</span>
            </div>
        `).join('');
    }

    async function submitWorkout(exerciseId, resultValue) {
        await apiCall('/api/workouts', {
            method: 'POST',
            body: JSON.stringify({
                vk_id: currentVKUser.id,
                exercise_id: parseInt(exerciseId),
                result: parseInt(resultValue)
            })
        });
        showToast('✅ Тренировка засчитана!');
        await refreshHomeScreen();
    }

    async function startWorkoutWithExercise(exerciseId) {
        const reps = prompt('Сколько подходов/повторений выполнили?', '1');
        if (reps && !isNaN(parseInt(reps)) && parseInt(reps) > 0) {
            try {
                await submitWorkout(exerciseId, parseInt(reps));
                showScreen('home');
            } catch (e) {
                showError('❌ Ошибка записи тренировки');
            }
        } else if (reps !== null) {
            showError('Введите корректное число');
        }
    }

    async function refreshHomeScreen() {
        if (!currentVKUser) return;
        const profile = await loadUserProfile(currentVKUser.id);
        if (profile) {
            document.getElementById('points').innerText = profile.points || 0;
            document.getElementById('coins').innerText = profile.coins || 0;
            document.getElementById('fuel').innerText = profile.fun_fuel || 0;
            document.getElementById('workouts_count').innerText = profile.workouts_count || 0;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ VK BRIDGE ----------
    async function init() {
        try {
            // Проверяем окружение
            const ua = navigator.userAgent;
            const isVK = ua.includes('VKApp') || ua.includes('VK_Android') || ua.includes('VK_iOS');

            if (!isVK) {
                console.warn('⚠️ Режим отладки: Не VK окружение');
                console.warn('💡 Используются тестовые данные');

                // Тестовые данные для отладки
                const testUser = {
                    id: 123456789,
                    first_name: 'Тестовый',
                    last_name: 'Пользователь',
                    photo_100: 'https://vk.com/images/camera_100.png'
                };

                currentVKUser = testUser;

                // Устанавливаем тестовые данные в DOM
                document.getElementById('user_name').innerText = `${testUser.first_name} ${testUser.last_name}`;
                document.getElementById('user_id').innerText = `${testUser.id} (отладка)`;
                document.getElementById('avatar').src = testUser.photo_100;

                // Устанавливаем тестовые баллы
                document.getElementById('points').innerText = '1500';
                document.getElementById('coins').innerText = '100';
                document.getElementById('fuel').innerText = '50';
                document.getElementById('workouts_count').innerText = '5';

                // Показываем сообщение
                const debugMsg = document.createElement('div');
                debugMsg.className = 'toast';
                debugMsg.style.background = 'rgba(255, 200, 0, 0.9)';
                debugMsg.innerHTML = '🧪 Режим отладки (тестовые данные)';
                document.body.appendChild(debugMsg);

                // Пропускаем все API вызовы в режиме отладки
                showScreen('home');
                return;
            }

            // Режим VK Mini App
            await vkBridge.send('VKWebAppInit');
            const vkUser = await vkBridge.send('VKWebAppGetUserInfo');
            currentVKUser = vkUser;

            document.getElementById('user_name').innerText = `${vkUser.first_name} ${vkUser.last_name || ''}`;
            document.getElementById('user_id').innerText = vkUser.id;
            document.getElementById('avatar').src = vkUser.photo_100 || 'https://vk.com/images/camera_100.png';

            await registerVKUser(vkUser);
            await loadUserProfile(vkUser.id);
            await refreshHomeScreen();

            // Предзагрузка данных для других экранов
            await Promise.all([loadExercises(), loadLeaderboard()]);

            showScreen('home');
        } catch (err) {
            console.error(err);
            showError('❌ Ошибка подключения к VK или серверу');
            document.getElementById('screen-splash').innerHTML = '<div class="error">Не удалось загрузить приложение</div>';
        }
    }

    // ---------- ДЕЛЕГИРОВАНИЕ СОБЫТИЙ (решает проблему утечек) ----------
    document.getElementById('exercisesList')?.addEventListener('click', (e) => {
        const exerciseDiv = e.target.closest('[data-exercise-id]');
        if (exerciseDiv) {
            const exId = exerciseDiv.dataset.exerciseId;
            if (exId) startWorkoutWithExercise(exId);
        }
    });

    // ---------- НАВИГАЦИЯ С ЛОАДЕРАМИ ----------
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', async () => {
            const screen = btn.dataset.screen;
            showScreen(screen);
            if (screen === 'sport') {
                document.getElementById('exercisesList').innerHTML = '<div class="loader">⏳ Загрузка...</div>';
                await loadExercises();
            }
            if (screen === 'ranking') {
                document.getElementById('leaderboardList').innerHTML = '<div class="loader">⏳ Загрузка...</div>';
                await loadLeaderboard();
            }
        });
    });

    document.getElementById('startWorkoutBtn')?.addEventListener('click', () => {
        showScreen('sport');
    });

    // Доп. кнопки в "Ещё"
    document.getElementById('mountainBtn')?.addEventListener('click', () => showToast('⛰️ Гора успеха — в разработке'));
    document.getElementById('hallOfFameBtn')?.addEventListener('click', () => showToast('🏆 Зал славы — в разработке'));
    document.getElementById('aiBtn')?.addEventListener('click', () => showToast('🤖 AI тренер — скоро'));
    document.getElementById('calendarBtn')?.addEventListener('click', () => showToast('📅 Календарь тренировок — скоро'));

    // Запуск
    init();
</script>
</body>
</html>
