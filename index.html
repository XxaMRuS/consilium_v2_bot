<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Bot</title>
    <script src="https://unpkg.com/@vkcom/vk-bridge/dist/vk-bridge.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .status {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            display: inline-block;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .button:active {
            transform: translateY(0);
        }

        .error {
            background: rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Загрузочный экран -->
        <div id="loading">
            <div class="logo">🏋️</div>
            <div class="title">Fitness Bot</div>
            <div class="subtitle">Загрузка приложения...</div>
            <div class="spinner"></div>
        </div>

        <!-- Главное меню -->
        <div id="main" class="hidden">
            <div class="logo">🏋️</div>
            <div class="title">Fitness Bot</div>
            <div class="subtitle">Твой персональный тренер</div>

            <div class="status" id="userInfo">
                Загрузка данных...
            </div>

            <button class="button" onclick="showProfile()">👤 Профиль</button>
            <button class="button" onclick="showWorkouts()">💪 Тренировки</button>
            <button class="button" onclick="showChallenges()">🏆 Челленджи</button>
        </div>

        <!-- Ошибка -->
        <div id="error" class="error"></div>
    </div>

    <script>
        let vkUser = null;

        function showError(message) {
            console.error('Error:', message);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main').classList.add('hidden');
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.textContent = message;
        }

        function showMain() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        }

        function showProfile() {
            if (vkUser) {
                alert(`Профиль: ${vkUser.first_name} ${vkUser.last_name}`);
            }
        }

        function showWorkouts() {
            alert('Раздел тренировок в разработке');
        }

        function showChallenges() {
            alert('Раздел челленджев в разработке');
        }

        // Инициализация VK Bridge
        window.onload = async function() {
            console.log('App loading...');

            // Проверяем что VK Bridge загружен
            if (typeof vkBridge === 'undefined') {
                showError('❌ VK Bridge не загружен. Откройте приложение через VK Mini App.');
                return;
            }

            try {
                // Отправляем событие готовности приложения
                await vkBridge.send('VKWebAppInit');

                console.log('VK Bridge initialized successfully');

                // Получаем данные пользователя
                const userData = await vkBridge.send('VKWebAppGetUserInfo');

                if (userData && userData.id) {
                    vkUser = userData;
                    console.log('User info:', vkUser);

                    // Показываем главное меню
                    document.getElementById('userInfo').innerHTML =
                        `👤 ${vkUser.first_name} ${vkUser.last_name}<br>` +
                        `<small>ID: ${vkUser.id}</small>`;

                    showMain();
                } else {
                    showError('❌ Не удалось получить данные пользователя');
                }

            } catch (error) {
                console.error('VK Bridge error:', error);
                showError('❌ Ошибка VK Bridge: ' + error.message);
            }
        };
    </script>
</body>
</html>
