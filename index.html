<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Bot</title>

    <!-- VK Bridge - МНОЖЕСТВО ИСТОЧНИКОВ для надежности -->
    <script src="https://unpkg.com/@vkcom/vk-bridge/dist/vk-bridge.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vkcom/vk-bridge/dist/vk-bridge.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .status {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            min-height: 60px;
        }

        .debug {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 11px;
            font-family: monospace;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            display: inline-block;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .button:active {
            transform: translateY(0);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hidden {
            display: none;
        }

        .error {
            background: rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success {
            background: rgba(0, 255, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Загрузочный экран -->
        <div id="loading">
            <div class="logo">🏋️</div>
            <div class="title">Fitness Bot</div>
            <div class="subtitle">Инициализация...</div>
            <div class="status" id="loadingStatus">Проверка окружения...</div>
            <div class="debug" id="debugLog"></div>
            <div class="spinner"></div>
        </div>

        <!-- Главное меню -->
        <div id="main" class="hidden">
            <div class="logo">🏋️</div>
            <div class="title">Fitness Bot</div>
            <div class="subtitle">Твой персональный тренер</div>

            <div class="success" id="userInfo">
                Загрузка данных...
            </div>

            <button class="button" onclick="showProfile()">👤 Профиль</button>
            <button class="button" onclick="showWorkouts()">💪 Тренировки</button>
            <button class="button" onclick="showChallenges()">🏆 Челленджи</button>
        </div>

        <!-- Ошибка -->
        <div id="error" class="hidden"></div>
    </div>

    <script>
        let vkUser = null;
        const debugLog = document.getElementById('debugLog');
        const loadingStatus = document.getElementById('loadingStatus');

        function addDebug(message) {
            const time = new Date().toLocaleTimeString();
            debugLog.innerHTML += `[${time}] ${message}<br>`;
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(message);
        }

        function updateStatus(message) {
            loadingStatus.textContent = message;
        }

        function showError(message) {
            addDebug('❌ ОШИБКА: ' + message);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main').classList.add('hidden');
            const errorDiv = document.getElementById('error');
            errorDiv.classList.remove('hidden');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
        }

        function showMain() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        }

        function showProfile() {
            if (vkUser) {
                alert(`👤 Профиль\n\nИмя: ${vkUser.first_name} ${vkUser.last_name}\nID: ${vkUser.id}`);
            }
        }

        function showWorkouts() {
            alert('💪 Раздел тренировок в разработке');
        }

        function showChallenges() {
            alert('🏆 Раздел челленджев в разработке');
        }

        // Проверка окружения
        function detectEnvironment() {
            addDebug('🔍 Проверка окружения...');

            // Проверка User Agent
            const ua = navigator.userAgent;
            addDebug(`UA: ${ua.substring(0, 100)}...`);

            // Проверка на VK приложение
            const isVK = ua.includes('VKApp') || ua.includes('VK_Android') || ua.includes('VK_iOS');
            addDebug(`VK App: ${isVK ? '✅ Да' : '❌ Нет'}`);

            // Проверка на iframe
            const inIframe = window.parent !== window;
            addDebug(`Iframe: ${inIframe ? '✅ Да' : '❌ Нет'}`);

            return { isVK, inIframe };
        }

        // Инициализация приложения
        window.onload = async function() {
            addDebug('🚀 Старт приложения');

            try {
                // Определяем окружение
                const env = detectEnvironment();

                // Проверяем загрузку VK Bridge
                updateStatus('Загрузка VK Bridge...');
                addDebug('⏳ Ожидание VK Bridge (удлиненное время)...');

                // Увеличиваем время ожидания и попытки
                let attempts = 0;
                const maxAttempts = 30; // Увеличили до 30 попыток (3 секунды)

                addDebug('Начинаем проверку vkBridge...');

                while (typeof vkBridge === 'undefined' && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;

                    if (attempts % 5 === 0) {
                        addDebug(`Попытка ${attempts}/${maxAttempts}...`);
                    }
                }

                if (typeof vkBridge === 'undefined') {
                    throw new Error('VK Bridge не загружен после ' + maxAttempts + ' попыток (3 секунды)');
                }

                addDebug('✅ VK Bridge загружен!');
                addDebug('Тип vkBridge: ' + typeof vkBridge);

                updateStatus('Инициализация VK Bridge...');

                // Отправляем событие инициализации с таймаутом
                addDebug('⏳ VKWebAppInit...');

                try {
                    await Promise.race([
                        vkBridge.send('VKWebAppInit'),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Таймаут VKWebAppInit')), 5000)
                    ]);
                    addDebug('✅ VKWebAppInit выполнен');
                } catch (initError) {
                    throw new Error('VKWebAppInit failed: ' + initError.message);
                }

                // Получаем данные пользователя с таймаутом
                updateStatus('Получение данных пользователя...');
                addDebug('⏳ VKWebAppGetUserInfo...');

                try {
                    const userData = await Promise.race([
                        vkBridge.send('VKWebAppGetUserInfo'),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Таймаут получения данных')), 5000)
                    ]);

                    if (!userData) {
                        throw new Error('Пустой ответ от VKWebAppGetUserInfo');
                    }

                    addDebug('✅ Данные пользователя получены');
                    addDebug(`👤 User: ${userData.first_name} ${userData.last_name} (ID: ${userData.id})`);

                    vkUser = userData;

                    // Показываем главное меню
                    document.getElementById('userInfo').innerHTML =
                        `👤 ${vkUser.first_name} ${vkUser.last_name}<br>` +
                        `<small>ID: ${vkUser.id}</small>`;

                    addDebug('🎉 Приложение инициализировано успешно!');
                    updateStatus('Готово!');

                    setTimeout(showMain, 500);

                } catch (userError) {
                    throw new Error('Не удалось получить данные пользователя: ' + userError.message);
                }

                addDebug('✅ Данные пользователя получены');
                addDebug(`👤 User: ${userData.first_name} ${userData.last_name} (ID: ${userData.id})`);

                vkUser = userData;

                // Показываем главное меню
                document.getElementById('userInfo').innerHTML =
                    `👤 ${vkUser.first_name} ${vkUser.last_name}<br>` +
                    `<small>ID: ${vkUser.id}</small>`;

                addDebug('🎉 Приложение инициализировано успешно!');
                updateStatus('Готово!');

                setTimeout(showMain, 500);

            } catch (error) {
                console.error('App error:', error);
                addDebug('❌ Критическая ошибка: ' + error.message);

                // Показываем детальную информацию об ошибке
                let errorDetails = `❌ Ошибка инициализации\n\n`;
                errorDetails += `Сообщение: ${error.message}\n\n`;

                if (error.message.includes('VK Bridge')) {
                    errorDetails += `Возможные причины:\n`;
                    errorDetails += `• Приложение открыто не через VK Mini Apps\n`;
                    errorDetails += `• Проблемы с интернетом\n`;
                    errorDetails += `• Блокировка скриптов\n\n`;
                    errorDetails += `Решение:\n`;
                    errorDetails += `Откройте приложение через VK Mini Apps`;
                } else {
                    errorDetails += `Stack: ${error.stack || 'Нет'}`;
                }

                showError(errorDetails);
            }
        };

        // Добавляем обработчик ошибок
        window.onerror = function(message, source, lineno, colno, error) {
            addDebug(`❌ Global error: ${message}`);
            console.error('Global error:', error);
        };

        // Добавляем обработчик unhandled rejections
        window.addEventListener('unhandledrejection', function(event) {
            addDebug(`❌ Unhandled rejection: ${event.reason}`);
            console.error('Unhandled rejection:', event);
        });

        // Добавляем дополнительную проверку каждую секунду
        setInterval(() => {
            if (typeof vkBridge !== 'undefined') {
                addDebug('💡 VK Bridge доступен (периодическая проверка)');
            } else {
                addDebug('⚠️ VK Bridge всё ещё не доступен');
            }
        }, 2000);
    </script>
</body>
</html>
