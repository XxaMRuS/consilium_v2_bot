<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Bot</title>

    <!-- VK Bridge - STATIC FILE -->
    <script src="/static/vk-bridge.min.js"></script>

    <!-- VK Bridge Debug -->
    <script>
        console.log('=== VK BRIDGE DEBUG ===');
        console.log('window.vkBridge:', window.vkBridge);
        console.log('window.vkConnect:', window.vkConnect);
        console.log('typeof vkBridge:', typeof window.vkBridge);
        console.log('typeof vkConnect:', typeof window.vkConnect);
        if (window.vkBridge) {
            console.log('✅ VK Bridge доступен!');
            console.log('Методы:', Object.keys(window.vkBridge));
        } else {
            console.log('❌ VK Bridge НЕ доступен!');
        }
        console.log('=== END DEBUG ===');
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .status {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            min-height: 60px;
        }

        .balances {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .balance-item {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            flex: 1;
            max-width: 100px;
        }

        .debug {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 11px;
            font-family: monospace;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }

        .hidden {
            display: none;
        }

        .error {
            background: rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="logo">🏋️</div>
            <div class="title">Fitness Bot</div>
            <div class="subtitle">Загрузка...</div>
            <div class="status" id="status">Инициализация...</div>
            <div class="debug" id="debug"></div>
        </div>

        <div id="main" class="hidden">
            <div class="logo">🏋️</div>
            <div class="title">Fitness Bot</div>
            <div class="subtitle">Твой персональный тренер</div>
            <div class="status" id="userInfo"></div>
            <div class="balances" id="userBalances"></div>
            <button class="button" onclick="testVK()">🔄 Проверить VK</button>
        </div>

        <div id="error" class="hidden"></div>
    </div>

    <script>
        const debugDiv = document.getElementById('debug');
        const statusDiv = document.getElementById('status');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `[${time}] ${msg}<br>`;
            console.log(msg);
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        function showMain() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        }

        function showError(msg) {
            log('❌ ' + msg);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('main').classList.add('hidden');
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
        }

        function testVK() {
            log('🧪 Тест VK Bridge...');
            if (typeof vkBridge !== 'undefined') {
                log('✅ vkBridge доступен!');
                log('Тип: ' + typeof vkBridge);
                log('Методы: ' + Object.keys(vkBridge).join(', '));
            } else {
                log('❌ vkBridge НЕ доступен');
            }
        }

        // Простая инициализация
        window.onload = async function() {
            log('🚀 Старт приложения');

            try {
                // Проверяем окружение
                const ua = navigator.userAgent;
                log('📱 User Agent: ' + ua.substring(0, 50) + '...');

                const isVK = ua.includes('VKApp') || ua.includes('VK_Android') || ua.includes('VK_iOS');
                log('VK App: ' + (isVK ? '✅ Да' : '❌ Нет'));

                // Ждем VK Bridge до 10 секунд
                log('⏳ Ожидание VK Bridge...');

                let attempts = 0;
                const maxAttempts = 100; // 10 секунд

                while (typeof vkBridge === 'undefined' && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;

                    if (attempts % 10 === 0) {
                        log(`⏳ Проверка ${attempts}/${maxAttempts}...`);
                    }
                }

                if (typeof vkBridge === 'undefined') {
                    throw new Error('VK Bridge не загружен за 10 секунд');
                }

                log('✅ VK Bridge загружен!');

                // Инициализация
                log('⏳ VKWebAppInit...');
                await vkBridge.send('VKWebAppInit');
                log('✅ VKWebAppInit OK');

                // Получаем данные
                log('⏳ VKWebAppGetUserInfo...');
                const userData = await vkBridge.send('VKWebAppGetUserInfo');

                if (!userData) {
                    throw new Error('Нет данных пользователя');
                }

                log(`✅ Пользователь: ${userData.first_name} ${userData.last_name}`);
                log(`📸 Аватар: ${userData.photo_100 || 'Нет'}`);

                // Получаем баллы с API
                log('⏳ Получение баллов с API...');
                let apiData = null;
                try {
                    const response = await fetch(`/api/users/${userData.id}`);

                    if (response.status === 404) {
                        log('⚠️ Пользователь не найден в базе данных');
                        log('💡 Необходимо зарегистрироваться через Telegram бота');
                        apiData = null;
                    } else if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    } else {
                        apiData = await response.json();
                        log(`✅ Баллы получены: ${apiData.balances.score} очков`);
                    }
                } catch (error) {
                    log(`⚠️ Ошибка API: ${error.message}`);
                }

                // Показываем результат
                const avatarUrl = userData.photo_100 || 'https://via.placeholder.com/100';

                document.getElementById('userInfo').innerHTML =
                    `<img src="${avatarUrl}" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 3px solid white;"><br>` +
                    `👤 ${userData.first_name} ${userData.last_name}<br>` +
                    `<small>ID: ${userData.id}</small>`;

                if (!apiData) {
                    document.getElementById('userBalances').innerHTML =
                        `<div style="background: rgba(255, 200, 0, 0.3); border-radius: 10px; padding: 15px; margin-bottom: 20px; font-size: 14px;">
                            ⚠️ Вы не зарегистрированы<br>
                            <small>Для использования функций зарегистрируйтесь через Telegram бота</small><br><br>
                            <a href="https://t.me/consilium_v2_bot" target="_blank"
                               style="background: rgba(255, 255, 255, 0.3); color: white; text-decoration: none; padding: 8px 16px; border-radius: 5px; display: inline-block; margin-top: 5px;">
                                🤖 Открыть Telegram бота
                            </a>
                        </div>`;
                } else {
                    const balances = apiData.balances || { score: 0, coins: 0, fun_fuel: 0 };
                    document.getElementById('userBalances').innerHTML =
                        `<div class="balance-item">⭐ ${balances.score}</div>` +
                        `<div class="balance-item">🪙 ${balances.coins}</div>` +
                        `<div class="balance-item">⚡ ${balances.fun_fuel}</div>`;
                }

                log('🎉 УСПЕХ!');

                setTimeout(showMain, 500);

            } catch (error) {
                console.error(error);
                showError('Ошибка: ' + error.message);
            }
        };
    </script>
</body>
</html>
