<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fitness Bot Test</title>
</head>
<body style="background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px;">
    <h1>🏋️ ТЕСТОВАЯ СТРАНИЦА</h1>
    <div id="status">Проверка...</div>

    <script>
        document.getElementById('status').innerHTML = '✅ JS работает!';

        // Проверка 1: Базовый JS
        console.log('✅ Базовый JS работает');

        // Проверка 2: Время
        const now = new Date();
        console.log('✅ Дата: ' + now);

        // Проверка 3: VK Bridge
        setTimeout(function() {
            document.getElementById('status').innerHTML += '<br>⏳ Проверка VK Bridge...';

            if (typeof vkBridge !== 'undefined') {
                document.getElementById('status').innerHTML += '<br>✅ VK Bridge ЕСТЬ!';
                console.log('✅ VK Bridge доступен');
            } else {
                document.getElementById('status').innerHTML += '<br>❌ VK Bridge НЕ доступен';
                console.log('❌ VK Bridge НЕ доступен');

                // Пробуем загрузить вручную
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/@vkcom/vk-bridge/dist/vk-bridge.min.js';
                script.onload = function() {
                    document.getElementById('status').innerHTML += '<br>✅ VK Bridge ЗАГРУЖЕН!';
                    console.log('✅ VK Bridge загружен вручную');
                };
                script.onerror = function() {
                    document.getElementById('status').innerHTML += '<br>❌ VK Bridge НЕ загрузился';
                    console.log('❌ VK Bridge не загрузился');
                };
                document.head.appendChild(script);
            }
        }, 1000);
    </script>
</body>
</html>
